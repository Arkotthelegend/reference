<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TACO RAIN ADMIN EVENT</title>
    <style>
        /* =========================================================
           🎯 ဘောင်အပြာ ဖျောက်ခြင်းနှင့် ကလစ်နှိပ်မှု Reset
           ========================================================= */
        * {
            -webkit-tap-highlight-color: transparent !important;
            -webkit-tap-highlight-color: rgba(0,0,0,0) !important;
            outline: none !important;
            box-sizing: border-box;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            margin: 0;
            overflow: hidden;
            background-color: #70c5ce; /* စစချင်း ပုံမှန် မိုးကောင်းကင်အရောင် */
            font-family: 'Courier New', Courier, monospace;
            color: #fff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: background-color 2s ease;
        }

        /* =========================================================
           ⛰️ PIXEL ART LANDSCAPE (နေ့ဘက် မြင်ကွင်း)
           ========================================================= */
        #game-world {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .pixel-hill-1 {
            position: absolute; bottom: 0; left: -15%; width: 75%; height: 35vh;
            background: #46c35f;
            border-top: 12px solid #3ca850;
            box-shadow: inset 0 15px 0 #3ca850;
            border-radius: 40px 40px 0 0;
            transition: all 1.5s ease;
        }

        .pixel-hill-2 {
            position: absolute; bottom: 0; right: -10%; width: 65%; height: 25vh;
            background: #3ca850;
            border-top: 12px solid #328c43;
            box-shadow: inset 0 15px 0 #328c43;
            border-radius: 50px 50px 0 0;
            transition: all 1.5s ease;
        }

        /* =========================================================
           🌌 NEON NIGHT MODE & CHAOS GLITCH (EVENT စချိန် Style)
           ========================================================= */
        body.neon-active {
            background-color: #0b001a; 
        }

        body.neon-active #game-world {
            animation: chaos-glitch 0.15s infinite;
        }

        body.neon-active .pixel-hill-1 {
            background: #120024;
            border-top: 10px solid #ff007f;
            box-shadow: 0 0 25px #ff007f, inset 0 15px 0 #ff007f;
        }

        body.neon-active .pixel-hill-2 {
            background: #0a0014;
            border-top: 10px solid #00ffff;
            box-shadow: 0 0 25px #00ffff, inset 0 15px 0 #00ffff;
        }

        @keyframes chaos-glitch {
            0% { filter: hue-rotate(0deg) contrast(1); }
            50% { filter: hue-rotate(180deg) contrast(1.2); transform: translate(-2px, 2px); }
            100% { filter: hue-rotate(360deg) contrast(1); transform: translate(2px, -2px); }
        }

        /* =========================================================
           🌮 TACO RAIN SYSTEM
           ========================================================= */
        #taco-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 3;
            pointer-events: none; 
        }

        .taco {
            position: absolute;
            top: -60px;
            pointer-events: none;
            animation: fall linear forwards, spin 2s linear infinite;
        }

        @keyframes fall { to { transform: translateY(105vh); } }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* =========================================================
           💬 MESSAGE BOX UI
           ========================================================= */
        .message-container {
            position: relative;
            z-index: 10;
            margin-top: 30px;
            width: 90%;
            max-width: 420px;
            background: rgba(0, 0, 0, 0.85);
            border: 3px solid #46c35f; 
            border-radius: 12px;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            transition: all 1s ease;
        }

        body.neon-active .message-container {
            border-color: #ff007f;
            box-shadow: 0 0 20px #ff007f, inset 0 0 10px #ff007f;
        }

        .character-img {
            width: 65px;
            height: 65px;
            border-radius: 50%;
            border: 2px solid #46c35f;
            object-fit: cover;
            transition: all 1s ease;
        }

        body.neon-active .character-img {
            border-color: #00ffff;
            animation: img-glitch 0.3s infinite;
        }

        @keyframes img-glitch {
            0% { transform: translate(0); filter: saturate(1); }
            50% { transform: translate(-2px, 1px); filter: saturate(2) hue-rotate(90deg); }
            100% { transform: translate(2px, -1px); filter: saturate(1); }
        }

        .text-content {
            flex: 1;
            font-size: 0.95rem;
            line-height: 1.4;
            color: #fff;
        }

        .live-status {
            position: absolute;
            top: -12px;
            right: 15px;
            background: #3ca850;
            color: white;
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 10px;
            font-weight: bold;
        }

        body.neon-active .live-status {
            background: #ff003c;
            box-shadow: 0 0 10px #ff003c;
            animation: blink 1s infinite;
        }

        /* =========================================================
           🔘 GLITCH BUTTON (မင်းတောင်းဆိုချက်အရ အရောင်ပြင်ဆင်ထားသည်)
           ========================================================= */
        .glitch-btn {
            position: absolute;
            bottom: 40px;
            z-index: 10;
            background: #ffaa00; /* ✨ အစိမ်းရောင်နောက်ခံနဲ့ မရောမွှေမယ့် တောက်ပသော ရွှေဝါရောင် ပြောင်းထားသည် */
            color: #000; /* စာလုံးအမည်း */
            border: 2px solid #000;
            padding: 15px 35px;
            font-size: 1.1rem;
            font-weight: bold;
            font-family: 'Courier New', Courier, monospace;
            cursor: pointer;
            border-radius: 6px;
            box-shadow: 0 5px 0 #b37700;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }

        /* Event စချိန်တွင်မှ နီယွန်အနီရောင် Glitch ဖြစ်သွားမည် */
        body.neon-active .glitch-btn {
            background: #ff003c;
            color: #fff;
            border: none;
            border-radius: 0px;
            box-shadow: 4px 4px 0 #00ffff, -4px -4px 0 #ff007f;
            animation: btn-glitch 0.1s infinite;
        }

        @keyframes btn-glitch {
            0% { transform: translate(0, 0); box-shadow: 4px 4px 0 #00ffff, -4px -4px 0 #ff007f; }
            50% { transform: translate(-2px, 2px); box-shadow: -4px 4px 0 #00ffff, 4px -4px 0 #ff007f; }
            100% { transform: translate(2px, -2px); box-shadow: -4px 4px 0 #ff007f, -4px 4px 0 #00ffff; }
        }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    </style>
</head>
<body>

    <audio id="bg-music" loop>
        <source src="https://www.dropbox.com/scl/fi/rn7s8uv14m7kmucd15mmd/It_s-Raining-Tacos-Reanimated-MP3_160K.mp3?rlkey=qvayb3qcc61rcz2tby5j3oxsv&st=el83uapf&raw=1" type="audio/mpeg">
    </audio>

    <div id="game-world">
        <div class="pixel-hill-1"></div>
        <div class="pixel-hill-2"></div>
    </div>

    <div id="taco-container"></div>

    <div class="message-container">
        <div class="live-status" id="status-tag">💤 WAITING</div>
        
        <img src="https://www.dropbox.com/scl/fi/edtb5myal5u46g78xilyi/admin.png?rlkey=43tkapf04lkkrsy2y8fd6my3t&st=4bu4x24o&raw=1" class="character-img" alt="Admin">
        
        <div class="text-content">
            <span id="message-text">Admin ကို စောင့်ဆိုင်းနေပါသည်...</span>
        </div>
    </div>

    <button class="glitch-btn" onclick="window.location.href='https://t.me/minaphayarkot'">
        Claim Gift ➔
    </button>

    <script>
        // =========================================================
        // ⚙️ ပြင်ဆင်ရန် အပိုင်း
        // =========================================================
        
        // 🚨 စမ်းသပ်ရန်အတွက် လက်ရှိအချိန် (ချက်ချင်းပွဲစမည့်စနစ်) ထားပေးထားသည်။
        // တကယ့်အချိန်နဲ့ ချိန်းချင်ရင် အောက်က line ကိုဖျက်ပြီး new Date(2026, 5, 25, 20, 30, 0).getTime() ပုံစံမျိုး ပြောင်းရေးပါ။
        const EVENT_START_TIME = new Date(2026, 5, 21, 22, 38, 0).getTime(); 
        
        const TIMELINE = [
            { time: 0,     text: "[SYSTEM] Admin @minaphayarkot has joined the server..." },
            { time: 4000,  text: "ဟေ့လူတွေ... အားလုံးပဲ အဆင်သင့်ဖြစ်ကြပြီလား!" },
            { time: 8000,  text: "အခု ငါတို့ App ထဲမှာ Live User <span style='color:#00ffff; font-weight:bold;' class='live-user-placeholder'>1,245</span> ယောက်တောင် ရှိနေတယ်ဟ။" },
            { time: 13000, text: "နောက်ထပ် <span style='color:#ff007f; font-weight:bold;'>အယောက် ၅၀</span> ထပ်ဝင်လာတာနဲ့ 1 Subject 1 Month FREE CODE ကို ဒီမှာပဲ ချပေးမယ်။" },
            { time: 18000, text: "ခဏစောင့်နော်... လူတက်လာတာကို စောင့်ကြည့်နေတယ်..." },
            { time: 23000, text: "အိုကေ!! လူပြည့်သွားပြီ! ကတိအတိုင်း FREE CODE ထုတ်ပေးလိုက်ပြီ။ 🎁" },
            { time: 27000, text: "မင်းတို့ရဲ့ CODE ကတော့: <span style='color:yellow; font-weight:bold; font-size:1.1rem; background:rgba(255,0,0,0.5); padding:2px 5px;'>TACO_GARDEN_2026</span> ဖြစ်ပါတယ်။" },
            { time: 32000, text: "Code ရတာနဲ့ အောက်ကခလုတ်ကို အမြန်ဆုံးနှိပ်ပြီး ငါ့ဆီလာပြောကြတော့! Limit ရှိတယ်နော်!!" }
        ];

        // =========================================================
        // 🚀 ENGINE LOGIC (အမှားပြင်ဆင်ပြီးသားစနစ်)
        // =========================================================

        const messageText = document.getElementById('message-text');
        const bgMusic = document.getElementById('bg-music');
        bgMusic.volume = 0.3; // သီချင်းအသံချုံ့ထားသည်

        const statusTag = document.getElementById('status-tag');
        let fakeUsers = 1245;
        let rainInterval = null;

        // User Counter
        setInterval(() => {
            fakeUsers += Math.floor(Math.random() * 6) + 2;
            document.querySelectorAll('.live-user-placeholder').forEach(el => {
                el.innerText = fakeUsers.toLocaleString();
            });
            if(document.body.classList.contains('neon-active')) {
                statusTag.innerHTML = `🔴 LIVE: ${fakeUsers.toLocaleString()} USERS`;
            }
        }, 1500);

        // Taco Rain Function
        function startTacoRain() {
            if (rainInterval) return;
            rainInterval = setInterval(() => {
                const taco = document.createElement('img');
                taco.src = "https://www.dropbox.com/scl/fi/hdxlj7m8kycjfdam2f86w/taco.png?rlkey=q72088oopkhxlgklnwt9demva&st=dizdia88&raw=1"; 
                taco.className = 'taco';
                taco.style.left = Math.random() * 100 + "vw";
                taco.style.width = (Math.random() * 25 + 30) + "px";
                taco.style.animationDuration = (Math.random() * 2 + 1.5) + "s";
                
                document.getElementById('taco-container').appendChild(taco);
                setTimeout(() => { taco.remove(); }, 3500);
            }, 180);
        }

        // Active Neon Page Function
        function activateNeonEvent() {
            if (!document.body.classList.contains('neon-active')) {
                document.body.classList.add('neon-active');
                statusTag.innerHTML = `🔴 LIVE: ${fakeUsers.toLocaleString()} USERS`;
                startTacoRain();
                
                bgMusic.play().catch(() => {
                    document.body.addEventListener('click', () => bgMusic.play(), { once: true });
                });
            }
        }

        // 🛠️ FIX: ၁ စက္ကန့်တစ်ခါ အချိန်ကို စစ်ဆေးမောင်းနှင်မည့် ပိုမိုသေချာသော Engine စနစ်
        function syncEventEngine() {
            const elapsed = Date.now() - EVENT_START_TIME;
            
            if (elapsed < 0) {
                // အချိန်မရောက်သေးပါက နဂို Screen (Waiting) အတိုင်းပြထားမည်
                statusTag.innerHTML = "💤 WAITING";
                messageText.innerHTML = "Admin ကို စောင့်ဆိုင်းနေပါသည်...";
                setTimeout(syncEventEngine, 1000); // ၁ စက္ကန့်တစ်ခါ အချိန်ကို စစ်နေမည်
                return;
            }

            // အချိန်ရောက်တာနဲ့ / ကျော်တာနဲ့ Neon Mode ချက်ချင်းပြောင်းမည်
            activateNeonEvent();

            let activeText = "Initializing protocols...";

            TIMELINE.forEach(item => {
                if (elapsed >= item.time) {
                    activeText = item.text; 
                } else {
                    setTimeout(() => {
                        messageText.innerHTML = item.text;
                    }, item.time - elapsed);
                }
            });

            messageText.innerHTML = activeText;
        }

        // 🛠️ FIX: window.onload ကို မစောင့်တော့ဘဲ Code ဖတ်တာနဲ့ တိုက်ရိုက် Engine ကို နှိုးလိုက်သည်
        syncEventEngine();
    </script>
</body>
</html>
