<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SYSTEM OVERRIDE</title>
    <style>
        body {
            background-color: #050505;
            color: #0f0;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            height: 100vh;
            overflow: hidden; /* Scroll မပေါ်အောင် ပိတ်ထားမည် */
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
            position: relative;
        }

        /* --- စိတ်လှုပ်ရှားစရာ Glitch Effect --- */
        .glitch-wrapper {
            text-align: center;
            margin-top: 10vh;
            margin-bottom: 20px;
            z-index: 10;
        }
        .glitch {
            font-size: 2.5rem;
            font-weight: bold;
            color: #ff003c;
            position: relative;
            display: inline-block;
            text-shadow: 0 0 10px #ff003c;
            opacity: 0; /* စစချင်း ဖျောက်ထားမည် */
        }
        .glitch::before, .glitch::after {
            content: attr(data-text);
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #050505;
        }
        .glitch::before {
            left: 3px; text-shadow: -2px 0 blue;
            animation: glitch-anim 2s infinite linear alternate-reverse;
        }
        .glitch::after {
            left: -3px; text-shadow: -2px 0 yellow;
            animation: glitch-anim 3s infinite linear alternate-reverse;
        }

        @keyframes glitch-anim {
            0% { clip: rect(10px, 9999px, 30px, 0); }
            20% { clip: rect(50px, 9999px, 60px, 0); transform: translate(-5px, 5px); }
            40% { clip: rect(20px, 9999px, 40px, 0); }
            60% { clip: rect(70px, 9999px, 80px, 0); transform: translate(5px, -5px); }
            80% { clip: rect(30px, 9999px, 50px, 0); }
            100% { clip: rect(60px, 9999px, 70px, 0); }
        }

        /* --- တုန်ခါသည့် Effect --- */
        .shake-heavy {
            animation: shake 0.3s cubic-bezier(.36,.07,.19,.97) both infinite;
        }
        @keyframes shake {
            0%, 100% { transform: translate(0, 0); }
            25% { transform: translate(-5px, 4px) rotate(-1deg); color: #ff003c; }
            50% { transform: translate(4px, -5px) rotate(1deg); background-color: rgba(255,0,0,0.1); }
            75% { transform: translate(-4px, -4px) rotate(-1deg); }
        }

        /* --- Terminal ပုံစံ --- */
        #terminal {
            flex: 1;
            font-size: 1rem;
            line-height: 1.8;
            overflow-y: hidden;
            z-index: 10;
        }
        .log-line { margin-bottom: 5px; }
        .sys-danger { color: #ff003c; font-weight: bold; }
        .sys-success { color: #38BDF8; font-weight: bold; }
        
        .cursor {
            display: inline-block; width: 10px; height: 1rem; background: #0f0;
            animation: blink 1s infinite; vertical-align: middle;
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        /* --- နောက်ခံမှာ Random စာတွေပြေးနေမည့် နေရာ --- */
        #bg-matrix {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            color: rgba(0, 255, 0, 0.15); font-size: 0.8rem; overflow: hidden;
            z-index: 1; pointer-events: none; padding: 10px; box-sizing: border-box;
            word-wrap: break-word; line-height: 1.2;
        }
    </style>
</head>
<body>

    <div id="bg-matrix"></div>

    <div class="glitch-wrapper">
        <div id="main-warning" class="glitch" data-text="SYSTEM COMPROMISED">SYSTEM COMPROMISED</div>
    </div>

    <div id="terminal"></div>

    <script>
        // 🚨 အရေးကြီးသည် 🚨
        // ပွဲစမည့် အချိန် (Year, Month (0-11), Day, Hour, Minute, Second) ကို သတ်မှတ်ပါ။
        // ဥပမာ - ၂၀၂၆၊ ဇူလိုင်လ (၆)၊ ၁ ရက်နေ့၊ ည ၈ နာရီ ၃၀ မိနစ်
        // Month က 0 ကနေစလို့ ဇူလိုင်ဆိုရင် 6 လို့ရေးရပါမယ်။
        const EVENT_START_TIME = new Date(2026, 6, 21, 21, 15, 0).getTime(); 

        // စမ်းသပ်ချင်ရင် အပေါ်က Code ကို ပိတ်ပြီး အောက်က Code ကို ဖွင့်ပါ (App ဖွင့်လိုက်တဲ့အချိန်ကစပြီး Event စပါမယ်)
        // const EVENT_START_TIME = Date.now(); 

        const terminal = document.getElementById('terminal');
        const warning = document.getElementById('main-warning');
        const bgMatrix = document.getElementById('bg-matrix');
        let currentLogs = "";

        // Event အချိန်ဇယား (မီလီစက္ကန့် ဖြင့်)
        const timeline = [
            { time: 0,     text: "> [ROOT] Admin connection established..." },
            { time: 3000,  text: "> Bypassing security protocols... [SUCCESS]" },
            { time: 7000,  text: "> Initiating Level-5 Database Purge.", class: "sys-danger", action: "start-matrix" },
            { time: 10000, text: "> WARNING: Core structure destabilizing!!!", action: "shake" },
            { time: 13000, text: "> Deleting: old_questions_2024.db... [DELETED]", class: "sys-danger" },
            { time: 16000, text: "> Deleting: user_cached_data.json... [DELETED]", class: "sys-danger" },
            { time: 20000, text: "> ⚠️ SYSTEM CORRUPTION DETECTED ⚠️", class: "sys-danger", action: "heavy-shake" },
            { time: 25000, text: "> Erasing complete. Halting purge operations." },
            { time: 28000, text: "> Injecting July Update Patch_v2.0...", action: "stop-shake" },
            { time: 32000, text: "> Restructuring UI Elements...", action: "stop-matrix" },
            { time: 36000, text: "> Finalizing maintenance mode. Please wait.", class: "sys-success", action: "maintenance-mode" }
        ];

        // နောက်ခံမှာ Hacker စာတွေ ပြေးနေအောင် လုပ်မည့် Function
        let matrixInterval;
        function spawnMatrix() {
            matrixInterval = setInterval(() => {
                const randomHex = Math.floor(Math.random()*16777215).toString(16);
                const randomFile = ["sys_config.dll", "boot_mgr.exe", "user_auth.key", "old_sub.db"][Math.floor(Math.random()*4)];
                bgMatrix.innerHTML += `Deleting 0x${randomHex} ... ${randomFile} <br>`;
                bgMatrix.scrollTop = bgMatrix.scrollHeight;
            }, 50); // အရမ်းမြန်မြန် ပြေးနေမည်
        }

        // Action များ ခိုင်းစေရန်
        function triggerAction(action) {
            if (action === "start-matrix") spawnMatrix();
            if (action === "shake") {
                warning.style.opacity = "1";
            }
            if (action === "heavy-shake") {
                document.body.classList.add('shake-heavy');
                warning.setAttribute('data-text', 'DATABASE PURGE');
                warning.innerText = 'DATABASE PURGE';
            }
            if (action === "stop-shake") {
                document.body.classList.remove('shake-heavy');
                warning.style.opacity = "0";
            }
            if (action === "stop-matrix") {
                clearInterval(matrixInterval);
                bgMatrix.innerHTML = "";
            }
            if (action === "maintenance-mode") {
                warning.style.opacity = "1";
                warning.style.color = "#38BDF8";
                warning.style.textShadow = "0 0 15px #38BDF8";
                warning.setAttribute('data-text', '🛠️ SYSTEM UPDATING 🛠️');
                warning.innerText = '🛠️ SYSTEM UPDATING 🛠️';
                document.querySelector('.cursor').style.background = "#38BDF8";
            }
        }

        // Terminal ထဲ စာထည့်ရန်
        function printLog(item, instant = false) {
            const cssClass = item.class ? `class="${item.class}"` : "";
            const logHTML = `<div class="log-line" ${cssClass}>${item.text}</div>`;
            
            if (instant) {
                // အချိန်နောက်ကျမှ ဝင်လာသူများအတွက် ချက်ချင်းပြမည်
                currentLogs += logHTML;
            } else {
                // အချိန်မှီ ကြည့်နေသူများအတွက် Typewriter မပါဘဲ ချက်ချင်းပေါ်လာသော်လည်း Time ကိုက်ပေါ်မည်
                currentLogs += logHTML;
                terminal.innerHTML = currentLogs + '<span class="cursor"></span>';
                if (item.action) triggerAction(item.action);
            }
        }

        // Live Event Synchronization
        function syncEvent() {
            const now = Date.now();
            let elapsed = now - EVENT_START_TIME; // ပွဲစကတည်းက ဘယ်လောက်ကြာသွားပြီလဲ တွက်မည်
            
            if (elapsed < 0) {
                // ပွဲမစခင် ဝင်လာသူများအတွက်
                terminal.innerHTML = `<div>> Waiting for Admin connection...</div><span class="cursor"></span>`;
                setTimeout(syncEvent, -elapsed);
                return;
            }

            let futureEvents = [];

            // Timeline တစ်ခုလုံးကို စစ်ဆေးမည်
            timeline.forEach(item => {
                if (item.time <= elapsed) {
                    // အချိန်ကျော်သွားသော (အရှေ့က) Event များကို ချက်ချင်း Print ထုတ်မည်
                    printLog(item, true);
                    // နောက်ဆုံး Action အခြေအနေကို ယူထားမည် (ဥပမာ- ရှုပ်ထွေးနေချိန် ဝင်လာရင် တုန်ခါနေအောင်)
                    if (item.action) triggerAction(item.action);
                } else {
                    // မရောက်သေးသော Event များကို စုထားမည်
                    futureEvents.push(item);
                }
            });

            // ကျော်သွားသော စာများအားလုံးကို တစ်ခါတည်း Terminal ထဲထည့်မည်
            terminal.innerHTML = currentLogs + '<span class="cursor"></span>';

            // မရောက်သေးသော Event များကို အချိန်ကိုက် ပေါ်လာစေရန် setTimeout ပေးမည်
            futureEvents.forEach(item => {
                const timeLeft = item.time - elapsed;
                setTimeout(() => {
                    printLog(item, false);
                }, timeLeft);
            });
        }

        window.onload = syncEvent;
    </script>
</body>
</html>
