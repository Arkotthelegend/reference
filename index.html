<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TACO RAIN ADMIN EVENT</title>
    <style>
        * {
            -webkit-tap-highlight-color: transparent !important;
            -webkit-tap-highlight-color: rgba(0,0,0,0) !important;
            outline: none !important;
            box-sizing: border-box;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            margin: 0;
            overflow: hidden;
            background-color: #70c5ce; 
            font-family: 'Courier New', Courier, monospace;
            color: #fff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: background-color 2s ease;
        }

        /* နောက်ခံမြေကြီးနှင့် နေလုံးပါဝင်သည့် World */
        #game-world {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1; /* အောက်ဆုံးတွင်ထားမည် */
            pointer-events: none;
        }

        /* နေလုံး (Sun) - ညာဘက်အပေါ်ထောင့် */
        .glitch-sun {
            position: absolute;
            top: 5vh;
            right: 5vw;
            width: 70px;
            height: 70px;
            background: #ffda66;
            border-radius: 50%;
            box-shadow: 0 0 25px #ffaa00;
            transition: all 1.5s ease;
        }

        /* Neon Mode တွင် နေလုံး Glitch ဖြစ်ခြင်း */
        body.neon-active .glitch-sun {
            background: #fff;
            box-shadow: 0 0 30px #00ffff, inset 0 0 15px #ff007f;
            animation: sun-core-glitch 4s infinite;
        }

        /* နေလုံးမှ အလင်းတန်းများ ဖြာထွက်ခြင်း */
        body.neon-active .glitch-sun::before,
        body.neon-active .glitch-sun::after {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            width: 100%; height: 100%;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            border: 3px solid transparent;
            animation: sun-rays-glitch 4s infinite;
        }

        body.neon-active .glitch-sun::before {
            border-color: #00ffff;
            animation-delay: 0.1s;
        }

        body.neon-active .glitch-sun::after {
            border-color: #ff007f;
            animation-delay: 0.25s;
        }

        @keyframes sun-core-glitch {
            0%, 90%, 100% { transform: scale(1) translate(0,0); }
            92% { transform: scale(1.1) translate(-3px, 3px); filter: hue-rotate(90deg); box-shadow: -5px 5px 0 #00ffff, 5px -5px 0 #ff007f; }
            94% { transform: scale(0.9) translate(3px, -3px); filter: hue-rotate(-90deg); box-shadow: 5px 5px 0 #ff007f, -5px -5px 0 #00ffff; }
            96% { transform: scale(1) translate(0,0); box-shadow: 0 0 30px #00ffff, inset 0 0 15px #ff007f; }
        }

        @keyframes sun-rays-glitch {
            0%, 90%, 100% { width: 100%; height: 100%; opacity: 0; }
            92% { width: 180%; height: 180%; opacity: 0.8; }
            95% { width: 300%; height: 300%; opacity: 0; }
        }

        /* နောက်ခံမြေကြီး (Glitch) */
        .pixel-hill-1 {
            position: absolute; bottom: 0; left: -15%; width: 75%; height: 35vh;
            background: #46c35f;
            border-top: 12px solid #3ca850;
            box-shadow: inset 0 15px 0 #3ca850;
            border-radius: 40px 40px 0 0;
            transition: all 1.5s ease;
        }

        .pixel-hill-2 {
            position: absolute; bottom: 0; right: -10%; width: 65%; height: 25vh;
            background: #3ca850;
            border-top: 12px solid #328c43;
            box-shadow: inset 0 15px 0 #328c43;
            border-radius: 50px 50px 0 0;
            transition: all 1.5s ease;
        }

        body.neon-active { background-color: #0b001a; }
        body.neon-active #game-world { animation: chaos-glitch 0.15s infinite; }
        body.neon-active .pixel-hill-1 {
            background: #120024; border-top: 10px solid #ff007f;
            box-shadow: 0 0 25px #ff007f, inset 0 15px 0 #ff007f;
        }
        body.neon-active .pixel-hill-2 {
            background: #0a0014; border-top: 10px solid #00ffff;
            box-shadow: 0 0 25px #00ffff, inset 0 15px 0 #00ffff;
        }

        @keyframes chaos-glitch {
            0% { filter: hue-rotate(0deg) contrast(1); }
            50% { filter: hue-rotate(180deg) contrast(1.2); transform: translate(-2px, 2px); }
            100% { filter: hue-rotate(360deg) contrast(1); transform: translate(2px, -2px); }
        }

        #taco-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 3; pointer-events: none; 
        }

        .taco {
            position: absolute; pointer-events: none;
            animation: fall linear forwards, spin 2s linear infinite;
        }

        @keyframes fall { 0% { top: -60px; } 100% { top: 110vh; } }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Message Box Z-index မြှင့်ထားသည် */
        .message-container {
            position: relative;
            z-index: 10;
            margin-top: 30px;
            width: 90%;
            max-width: 420px;
            background: rgba(0, 0, 0, 0.85);
            border: 3px solid #46c35f; 
            border-radius: 12px;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            transition: all 1s ease;
        }

        body.neon-active .message-container {
            border-color: #ff007f; box-shadow: 0 0 20px #ff007f, inset 0 0 10px #ff007f;
        }

        .character-img {
            width: 65px; height: 65px; border-radius: 50%;
            border: 2px solid #46c35f; object-fit: cover; transition: all 1s ease;
        }

        body.neon-active .character-img {
            border-color: #00ffff; animation: img-glitch 0.3s infinite;
        }

        @keyframes img-glitch {
            0% { transform: translate(0); filter: saturate(1); }
            50% { transform: translate(-2px, 1px); filter: saturate(2) hue-rotate(90deg); }
            100% { transform: translate(2px, -1px); filter: saturate(1); }
        }

        .text-content { flex: 1; font-size: 0.95rem; line-height: 1.4; color: #fff; }

        .live-status {
            position: absolute; top: -12px; right: 15px;
            background: #3ca850; color: white; font-size: 0.7rem;
            padding: 2px 8px; border-radius: 10px; font-weight: bold;
        }

        body.neon-active .live-status {
            background: #ff003c; box-shadow: 0 0 10px #ff003c; animation: blink 1s infinite;
        }

        .glitch-btn {
            position: absolute; bottom: 40px; z-index: 10;
            background: #ffaa00; color: #000; border: 2px solid #000;
            padding: 15px 35px; font-size: 1.1rem; font-weight: bold;
            font-family: 'Courier New', Courier, monospace; cursor: pointer;
            border-radius: 6px; box-shadow: 0 5px 0 #b37700;
            text-transform: uppercase; transition: all 0.3s ease;
        }

        body.neon-active .glitch-btn {
            background: #ff003c; color: #fff; border: none; border-radius: 0px;
            box-shadow: 4px 4px 0 #00ffff, -4px -4px 0 #ff007f; animation: btn-glitch 0.1s infinite;
        }

        @keyframes btn-glitch {
            0% { transform: translate(0, 0); box-shadow: 4px 4px 0 #00ffff, -4px -4px 0 #ff007f; }
            50% { transform: translate(-2px, 2px); box-shadow: -4px 4px 0 #00ffff, 4px -4px 0 #ff007f; }
            100% { transform: translate(2px, -2px); box-shadow: -4px 4px 0 #ff007f, -4px 4px 0 #00ffff; }
        }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    </style>

        // 🎵 သီချင်းကို Real-time ချိန်ညှိပေးမည့် Function
        function syncAudioTime() {
            if (bgMusic.readyState >= 1) { // သီချင်း Data ရပြီဆိုပါက
                const elapsedMS = Date.now() - EVENT_START_TIME;
                if (elapsedMS > 0 && bgMusic.duration > 0) {
                    const expectedTime = (elapsedMS / 1000) % bgMusic.duration; // သီချင်းကြာချိန်နှင့် လှည့်ပတ်စစ်ဆေးခြင်း
                    // ရောက်ရမည့်အချိန်နှင့် လက်ရှိဖွင့်နေသည့်အချိန် ၀.၅ စက္ကန့်ထက်ပိုကွာနေမှသာ ပြင်ဆင်မည် (အထစ်အငေါ့မဖြစ်စေရန်)
                    if (Math.abs(bgMusic.currentTime - expectedTime) > 0.5) {
                        bgMusic.currentTime = expectedTime;
                    }
                }
            }
        }

        // သီချင်း Data ဝင်လာသည်နှင့် အချိန်ချက်ချင်း ချိန်မည်
        bgMusic.addEventListener('loadedmetadata', syncAudioTime);

        setInterval(syncAudioTime, 5000); 

        function startTacoRain() {
            if (rainInterval) return;
            rainInterval = setInterval(() => {
                const taco = document.createElement('img');
                taco.src = "https://www.dropbox.com/scl/fi/hdxlj7m8kycjfdam2f86w/taco.png?rlkey=q72088oopkhxlgklnwt9demva&st=8pl3atab&raw=1";

                taco.style.left = Math.random() * 100 + "vw";
                taco.style.width = (Math.random() * 25 + 30) + "px";
                taco.style.animationDuration = (Math.random() * 2 + 1.5) + "s";
                
                document.getElementById('taco-container').appendChild(taco);
                setTimeout(() => { taco.remove(); }, 3500);
            }, 180);
        }

        function activateNeonEvent() {
            if (!document.body.classList.contains('neon-active')) {
                document.body.classList.add('neon-active');
                
                startTacoRain();
                statusTag.innerHTML = "🔴 LIVE";
                
                // သီချင်းကို Real-time sync လုပ်ပြီး ဖွင့်မည်
                bgMusic.play().then(() => {
                    syncAudioTime();
                }).catch(() => {
                    document.body.addEventListener('click', () => {
                        bgMusic.play();
                        syncAudioTime();
                    }, { once: true });
                });
            }
        }

        function endEvent() {
            bgMusic.pause();
            if (rainInterval) clearInterval(rainInterval); 
            document.getElementById('taco-container').innerHTML = '';
            claimBtn.style.display = 'none'; 
            document.getElementById('update-screen').style.display = 'flex'; 
        }

        function syncEventEngine() {
            const elapsed = Date.now() - EVENT_START_TIME;
            
            if (elapsed < 0) {
                statusTag.innerHTML = "💤 WAITING";
                messageText.innerHTML = "Admin ကို စောင့်ဆိုင်းနေပါသည်...";
                setTimeout(syncEventEngine, 1000); 
                return;
            }

            activateNeonEvent();

            let activeText = "Initializing protocols...";
            let codeRevealed = false;

            TIMELINE.forEach(item => {
                const hasCode = item.text.includes("CODE") || item.text.includes("Code");
                if (elapsed >= item.time) {
                    activeText = item.text; 
                    if (hasCode) codeRevealed = true;
                } else {
                    setTimeout(() => {
                        messageText.innerHTML = item.text;
                        if (hasCode) claimBtn.style.display = 'block'; 
                    }, item.time - elapsed);
                }
            });

            messageText.innerHTML = activeText;
            if (codeRevealed) claimBtn.style.display = 'block';

            const lastItem = TIMELINE[TIMELINE.length - 1];
            const endTime = lastItem.time + (3000 * TIME_MULTIPLIER);
            
            if (elapsed >= endTime) {
                endEvent();
            } else {
                setTimeout(endEvent, endTime - elapsed);
            }
        }

        syncEventEngine();
    </script>
</body>
</html>
