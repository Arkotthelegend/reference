    <title>TACO RAIN ADMIN EVENT</title>
    <style>

        * {
            -webkit-tap-highlight-color: transparent !important;
            -webkit-tap-highlight-color: rgba(0,0,0,0) !important;
            outline: none !important;
            box-sizing: border-box;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            margin: 0;
            overflow: hidden;
            background-color: #70c5ce; 
            font-family: 'Courier New', Courier, monospace;
            color: #fff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: background-color 2s ease;
        }

    
        #game-world {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .pixel-hill-1 {
            position: absolute; bottom: 0; left: -15%; width: 75%; height: 35vh;
            background: #46c35f;
            border-top: 12px solid #3ca850;
            box-shadow: inset 0 15px 0 #3ca850;
            border-radius: 40px 40px 0 0;
            transition: all 1.5s ease;
        }

        .pixel-hill-2 {
            position: absolute; bottom: 0; right: -10%; width: 65%; height: 25vh;
            background: #3ca850;
            border-top: 12px solid #328c43;
            box-shadow: inset 0 15px 0 #328c43;
            border-radius: 50px 50px 0 0;
            transition: all 1.5s ease;
        }

        body.neon-active {
            background-color: #0b001a; 
        }

        body.neon-active #game-world {
            animation: chaos-glitch 0.15s infinite;
        }

        body.neon-active .pixel-hill-1 {
            background: #120024;
            border-top: 10px solid #ff007f;
            box-shadow: 0 0 25px #ff007f, inset 0 15px 0 #ff007f;
        }

        body.neon-active .pixel-hill-2 {
            background: #0a0014;
            border-top: 10px solid #00ffff;
            box-shadow: 0 0 25px #00ffff, inset 0 15px 0 #00ffff;
        }

        @keyframes chaos-glitch {
            0% { filter: hue-rotate(0deg) contrast(1); }
            50% { filter: hue-rotate(180deg) contrast(1.2); transform: translate(-2px, 2px); }
            100% { filter: hue-rotate(360deg) contrast(1); transform: translate(2px, -2px); }
        }

        #taco-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 3;
            pointer-events: none; 
        }

        .taco {
            position: absolute;
            pointer-events: none;
            /* top နဲ့ rotate ကို ခွဲခြားအလုပ်လုပ်စေသည် */
            animation: fall linear forwards, spin 2s linear infinite;
        }

        @keyframes fall { 
            0% { top: -60px; }
            100% { top: 110vh; } 
        }
        @keyframes spin { 
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); } 
        }

        .message-container {
            position: relative;
            z-index: 10;
            margin-top: 30px;
            width: 90%;
            max-width: 420px;
            background: rgba(0, 0, 0, 0.85);
            border: 3px solid #46c35f; 
            border-radius: 12px;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            transition: all 1s ease;
        }

        body.neon-active .message-container {
            border-color: #ff007f;
            box-shadow: 0 0 20px #ff007f, inset 0 0 10px #ff007f;
        }

        .character-img {
            width: 65px;
            height: 65px;
            border-radius: 50%;
            border: 2px solid #46c35f;
            object-fit: cover;
            transition: all 1s ease;
        }

        body.neon-active .character-img {
            border-color: #00ffff;
            animation: img-glitch 0.3s infinite;
        }

        @keyframes img-glitch {
            0% { transform: translate(0); filter: saturate(1); }
            50% { transform: translate(-2px, 1px); filter: saturate(2) hue-rotate(90deg); }
            100% { transform: translate(2px, -1px); filter: saturate(1); }
        }

        .text-content {
            flex: 1;
            font-size: 0.95rem;
            line-height: 1.4;
            color: #fff;
        }

        .live-status {
            position: absolute;
            top: -12px;
            right: 15px;
            background: #3ca850;
            color: white;
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 10px;
            font-weight: bold;
        }

        body.neon-active .live-status {
            background: #ff003c;
            box-shadow: 0 0 10px #ff003c;
            animation: blink 1s infinite;
        }

        .glitch-btn {

            z-index: 10;
            background: #ffaa00; 
            color: #000; 
            border: 2px solid #000;
            padding: 15px 35px;
            font-size: 1.1rem;
            font-weight: bold;
            font-family: 'Courier New', Courier, monospace;
            cursor: pointer;

            box-shadow: 0 5px 0 #b37700;

            50% { transform: translate(-2px, 2px); box-shadow: -4px 4px 0 #00ffff, 4px -4px 0 #ff007f; }
            100% { transform: translate(2px, -2px); box-shadow: -4px 4px 0 #ff007f, -4px 4px 0 #00ffff; }
        }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    </style>

        let fakeUsers = 97;
        let rainInterval = null;
        let isUserCounterRunning = false; // ထပ်ခါထပ်ခါ Run တာကို တားရန်

        // User Counter Engine သစ်
        function startUserCounter() {
            if (isUserCounterRunning) return;
            isUserCounterRunning = true;

            // စစချင်း 97 ယောက်ကို ပြပေးမည်
            updateUserUI();

            function loopCounter() {
                // ၂ စက္ကန့် မှ ၄ စက္ကန့် ကြား Random အချိန် (2000ms to 4000ms)
                const randomDelay = Math.floor(Math.random() * 2000) + 1000;

                setTimeout(() => {
                    // User တက်မလား၊ ကျမလား သတ်မှတ်ခြင်း (80% chance က တက်မည်၊ 20% chance က ကျမည်)
                    const isIncrease = Math.random() < 0.73;

                    if (isIncrease) {
                        // ၃ ယောက် မှ ၅ ယောက် အထိ တက်မည်
                        fakeUsers += Math.floor(Math.random() * 3) + 3;
                    } else {
                        // ၁ ယောက် မှ ၂ ယောက် အထိ ကျမည်
                        fakeUsers -= Math.floor(Math.random() * 2) + 1;
                        
                        // User အရေအတွက် 97 အောက် မရောက်သွားအောင် ထိန်းထားမည်
                        if (fakeUsers < 97) fakeUsers = 97; 
                    }

                    updateUserUI();
                    loopCounter(); // နောက်တစ်ကြိမ်အတွက် ဆက်ပြီး Run မည်
                }, randomDelay);
            }

            loopCounter();
        }

        function updateUserUI() {
            document.querySelectorAll('.live-user-placeholder').forEach(el => {
                el.innerText = fakeUsers.toLocaleString();
            });
            if(document.body.classList.contains('neon-active')) {
                statusTag.innerHTML = `🔴 LIVE: ${fakeUsers.toLocaleString()} USERS`;
            }
        }

        // Taco Rain Function
        function startTacoRain() {
            if (rainInterval) return;
            rainInterval = setInterval(() => {
                const taco = document.createElement('img');
                taco.src = "https://www.dropbox.com/scl/fi/hdxlj7m8kycjfdam2f86w/taco.png?rlkey=q72088oopkhxlgklnwt9demva&st=8pl3atab&raw=1";

                taco.style.left = Math.random() * 100 + "vw";
                taco.style.width = (Math.random() * 25 + 30) + "px";
                taco.style.animationDuration = (Math.random() * 2 + 1.5) + "s";
                
                document.getElementById('taco-container').appendChild(taco);
                setTimeout(() => { taco.remove(); }, 3500);
            }, 180);
        }

        // Active Neon Page Function
        // Active Neon Page Function
        function activateNeonEvent() {
            if (!document.body.classList.contains('neon-active')) {
                document.body.classList.add('neon-active');
                
                // Event စပြီဖြစ်တဲ့အတွက် Taco မိုးရွာမယ်၊ User 97 ယောက်ကနေ စတက်မယ်

        // 🛠️ FIX: ၁ စက္ကန့်တစ်ခါ အချိန်ကို စစ်ဆေးမောင်းနှင်မည့် ပိုမိုသေချာသော Engine စနစ်
        function syncEventEngine() {
            const elapsed = Date.now() - EVENT_START_TIME;
            
            if (elapsed < 0) {
                // အချိန်မရောက်သေးပါက နဂို Screen (Waiting) အတိုင်းပြထားမည်
                statusTag.innerHTML = "💤 WAITING";
                messageText.innerHTML = "Admin ကို စောင့်ဆိုင်းနေပါသည်...";
                setTimeout(syncEventEngine, 1000); // ၁ စက္ကန့်တစ်ခါ အချိန်ကို စစ်နေမည်
                return;
            }

            // အချိန်ရောက်တာနဲ့ / ကျော်တာနဲ့ Neon Mode ချက်ချင်းပြောင်းမည်
            activateNeonEvent();

            let activeText = "Initializing protocols...";

            TIMELINE.forEach(item => {
                if (elapsed >= item.time) {
                    activeText = item.text; 
                } else {
                    setTimeout(() => {
                        messageText.innerHTML = item.text;
                    }, item.time - elapsed);
                }
            });

            messageText.innerHTML = activeText;
        }

        // 🛠️ FIX: window.onload ကို မစောင့်တော့ဘဲ Code ဖတ်တာနဲ့ တိုက်ရိုက် Engine ကို နှိုးလိုက်သည်
        syncEventEngine();
